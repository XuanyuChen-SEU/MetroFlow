<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MetroFlow Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.2/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg-base: #09111b;
            --bg-panel: rgba(17, 27, 40, 0.96);
            --border-color: #21334c;
            --text-main: #e6eef8;
            --text-sub: #8ca2bc;
            --primary: #0081ff;
            --cyan: #00d2ff;
            --green: #00b365;
            --yellow: #faad14;
            --red: #e60026;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text-main);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(0, 129, 255, 0.22), transparent 28%),
                radial-gradient(circle at top right, rgba(0, 210, 255, 0.14), transparent 24%),
                var(--bg-base);
        }

        .page {
            padding: 16px;
        }

        .topbar {
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            background: var(--bg-panel);
            margin-bottom: 16px;
        }

        .brand {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 4px;
        }

        .tabs {
            display: flex;
            gap: 12px;
        }

        .tab-btn, .ghost-btn {
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-main);
            border-radius: 10px;
            padding: 10px 16px;
            cursor: pointer;
        }

        .tab-btn.active, .ghost-btn.primary {
            background: rgba(0, 129, 255, 0.18);
            border-color: var(--primary);
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }

        .metric-card, .panel, .control-bar {
            border: 1px solid var(--border-color);
            border-radius: 14px;
            background: var(--bg-panel);
        }

        .metric-card {
            padding: 18px;
        }

        .metric-label {
            color: var(--text-sub);
            font-size: 13px;
            margin-bottom: 10px;
        }

        .metric-value {
            font-size: 28px;
            font-weight: 700;
        }

        .overview-layout {
            display: grid;
            grid-template-columns: 24% 1fr 26%;
            gap: 16px;
        }

        .overview-side {
            display: grid;
            grid-template-rows: 1fr 1fr;
            gap: 16px;
        }

        .panel {
            padding: 16px;
            min-height: 340px;
        }

        .panel.large {
            min-height: 420px;
        }

        .panel-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .chart {
            width: 100%;
            height: 360px;
        }

        .panel.large .chart {
            height: 420px;
        }

        .map-panel {
            position: relative;
            min-height: 420px;
        }

        .map-panel .panel-title {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 1;
            margin-bottom: 0;
        }

        .summary-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .summary-item {
            padding-left: 12px;
            border-left: 3px solid var(--primary);
        }

        .summary-label {
            color: var(--text-sub);
            font-size: 12px;
            margin-bottom: 6px;
        }

        .summary-value {
            font-size: 14px;
            line-height: 1.5;
        }

        .control-bar {
            display: grid;
            grid-template-columns: 100px 1fr auto;
            align-items: center;
            gap: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .time-text {
            font-size: 28px;
            font-weight: 700;
            color: var(--cyan);
        }

        .ctrl-group {
            display: flex;
            gap: 12px;
        }

        .tips {
            color: var(--text-sub);
            font-size: 12px;
            margin-top: 12px;
        }

        input[type="range"] {
            width: 100%;
        }

        @media (max-width: 1200px) {
            .metrics, .overview-layout, .main-grid {
                grid-template-columns: 1fr;
            }

            .overview-side {
                grid-template-rows: none;
            }

            .control-bar {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="topbar">
            <div>
                <div class="brand">MetroFlow</div>
                <div class="subtitle">单文件 API 联调页，适合后端开发时快速验证接口</div>
            </div>
            <div class="tabs">
                <button class="tab-btn active" data-tab="overview">全国概览</button>
                <button class="tab-btn" data-tab="shanghai">上海微观</button>
            </div>
        </header>

        <section id="overview" class="tab-panel active">
            <div class="metrics">
                <div class="metric-card">
                    <div class="metric-label">开通地铁城市</div>
                    <div id="metric-city-count" class="metric-value">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">最新统计日期</div>
                    <div id="metric-total-flow" class="metric-value">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">全国最新总客流</div>
                    <div id="metric-station-count" class="metric-value">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">监测时间跨度</div>
                    <div id="metric-transfer-count" class="metric-value">--</div>
                </div>
            </div>

            <div class="overview-layout">
                <div class="panel">
                    <div class="panel-title">客流 Top10 城市</div>
                    <div id="top10-chart" class="chart"></div>
                </div>

                <div class="panel large map-panel">
                    <div class="panel-title">全国线网客流强度分布图</div>
                    <div id="city-map" class="chart"></div>
                </div>

                <div class="overview-side">
                    <div class="panel">
                        <div class="panel-title">近 15 天客流趋势对比</div>
                        <div id="trend-chart" class="chart"></div>
                    </div>
                    <div class="panel">
                        <div class="panel-title">最新监测摘要</div>
                        <div class="summary-list">
                            <div class="summary-item">
                                <div class="summary-label">监测峰值城市</div>
                                <div id="summary-peak-city" class="summary-value">--</div>
                            </div>
                            <div class="summary-item">
                                <div class="summary-label">上海站点总数</div>
                                <div id="summary-station-count" class="summary-value">--</div>
                            </div>
                            <div class="summary-item">
                                <div class="summary-label">换乘站数量</div>
                                <div id="summary-transfer-count" class="summary-value">--</div>
                            </div>
                            <div class="summary-item">
                                <div class="summary-label">数据来源</div>
                                <div id="summary-source" class="summary-value">--</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="shanghai" class="tab-panel">
            <div class="control-bar">
                <div id="time-text" class="time-text">08:00</div>
                <input id="hour-range" type="range" min="0" max="23" value="8" />
                <div class="ctrl-group">
                    <button id="play-btn" class="ghost-btn primary">播放</button>
                    <button id="reload-btn" class="ghost-btn">刷新</button>
                </div>
            </div>

            <div class="main-grid">
                <div class="panel large">
                    <div class="panel-title">上海站点散点图</div>
                    <div id="station-scatter" class="chart"></div>
                    <div class="tips">点击散点可查看单站点 24 小时曲线</div>
                </div>
                <div class="panel">
                    <div class="panel-title">线路热力条</div>
                    <div id="line-heat" class="chart"></div>
                </div>
                <div class="panel">
                    <div id="station-title" class="panel-title">站点详情</div>
                    <div id="station-detail" class="chart"></div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:5000/api";
        const hourRange = document.getElementById("hour-range");
        const timeText = document.getElementById("time-text");
        const playBtn = document.getElementById("play-btn");
        const reloadBtn = document.getElementById("reload-btn");
        const stationTitle = document.getElementById("station-title");

        const cityMapChart = echarts.init(document.getElementById("city-map"));
        const top10Chart = echarts.init(document.getElementById("top10-chart"));
        const trendChart = echarts.init(document.getElementById("trend-chart"));
        const scatterChart = echarts.init(document.getElementById("station-scatter"));
        const lineHeatChart = echarts.init(document.getElementById("line-heat"));
        const stationDetailChart = echarts.init(document.getElementById("station-detail"));

        let currentHour = 8;
        let currentStation = "人民广场";
        let playing = false;
        let timer = null;
        const chinaGeoUrl = "https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json";
        let shanghaiTopology = { lines: [], extent: null };

        function formatHour(hour) {
            return `${String(hour).padStart(2, "0")}:00`;
        }

        function setActiveTab(tabName) {
            document.querySelectorAll(".tab-btn").forEach((button) => {
                button.classList.toggle("active", button.dataset.tab === tabName);
            });
            document.querySelectorAll(".tab-panel").forEach((panel) => {
                panel.classList.toggle("active", panel.id === tabName);
            });
            window.dispatchEvent(new Event("resize"));
        }

        async function request(path, params) {
            const response = await axios.get(`${API_BASE}${path}`, { params });
            return response.data.data;
        }

        async function loadOverview() {
            const [overview, cities] = await Promise.all([
                request("/overview"),
                request("/overview/cities"),
            ]);

            document.getElementById("metric-city-count").textContent = overview.metrics.city_count;
            document.getElementById("metric-total-flow").textContent = overview.metrics.latest_stat_date;
            document.getElementById("metric-station-count").textContent = `${overview.metrics.total_daily_flow} 万`;
            document.getElementById("metric-transfer-count").textContent = `${overview.metrics.tracked_days} 天`;
            document.getElementById("summary-peak-city").textContent = overview.meta.peak_city ? `${overview.meta.peak_city.city_name} · ${overview.meta.peak_city.value} 万人次` : "--";
            document.getElementById("summary-station-count").textContent = `${overview.metrics.station_count} 站`;
            document.getElementById("summary-transfer-count").textContent = `${overview.metrics.transfer_station_count} 站`;
            document.getElementById("summary-source").textContent = overview.meta.source || "--";

            const mapData = cities
                .filter((item) => Number.isFinite(Number(item.longitude)) && Number.isFinite(Number(item.latitude)))
                .map((item) => ({
                    name: item.city_name,
                    value: [Number(item.longitude), Number(item.latitude), Number(item.avg_daily_flow)],
                    statDate: item.stat_date,
                }));
            const values = mapData.map((item) => item.value[2]);
            const minValue = values.length ? Math.min(...values) : 0;
            const maxValue = values.length ? Math.max(...values) : 1;

            const renderCityMap = (hasGeoJson) => {
                const option = {
                    backgroundColor: "transparent",
                    tooltip: {
                        trigger: "item",
                        formatter: (params) => `${params.name}<br/>最新客流：${params.value[2]} 万人次<br/>统计日期：${params.data.statDate}`,
                    },
                    visualMap: {
                        type: "continuous",
                        min: minValue,
                        max: maxValue,
                        calculable: true,
                        inRange: {
                            color: ["#00b365", "#0081ff", "#faad14", "#e60026"],
                            symbolSize: [8, 26],
                        },
                        textStyle: { color: "#8b9bb4" },
                        bottom: 12,
                        left: 12,
                        itemHeight: 92,
                        itemWidth: 10,
                    },
                    series: [{
                        type: "scatter",
                        coordinateSystem: hasGeoJson ? "geo" : "cartesian2d",
                        data: mapData,
                        itemStyle: { opacity: 0.9 },
                        label: {
                            show: true,
                            formatter: "{b}",
                            position: "right",
                            color: "#8b9bb4",
                            fontSize: 10,
                        },
                    }],
                };

                if (hasGeoJson) {
                    option.geo = {
                        map: "china",
                        roam: true,
                        zoom: 1.15,
                        center: [105, 36],
                        itemStyle: { areaColor: "#0c1421", borderColor: "#1b263b", borderWidth: 1 },
                        emphasis: { itemStyle: { areaColor: "#122036" }, label: { show: false } },
                    };
                } else {
                    option.xAxis = { type: "value", show: false, min: 70, max: 140 };
                    option.yAxis = { type: "value", show: false, min: 15, max: 55 };
                }

                cityMapChart.setOption(option, true);
            };

            try {
                const geoJson = await fetch(chinaGeoUrl).then((response) => response.json());
                echarts.registerMap("china", geoJson);
                renderCityMap(true);
            } catch (error) {
                console.warn("China geojson unavailable, fallback to scatter view.", error);
                renderCityMap(false);
            }

            top10Chart.setOption({
                grid: { top: 10, bottom: 20, left: 45, right: 40 },
                tooltip: { trigger: "item", formatter: (params) => `${params.name}<br/>最新客流：${params.value} 万人次` },
                xAxis: { type: "value", show: false },
                yAxis: {
                    type: "category",
                    data: overview.top10.map((item) => item.city_name).reverse(),
                    axisLine: { show: false },
                    axisTick: { show: false },
                    axisLabel: { color: "#8b9bb4" },
                },
                series: [{
                    type: "bar",
                    data: overview.top10.map((item) => item.value).reverse(),
                    barWidth: 22,
                    itemStyle: { color: "#0081ff", borderRadius: [0, 4, 4, 0] },
                    label: { show: true, position: "right", color: "#00d2ff", fontSize: 12, fontWeight: 600 },
                }],
            });

            trendChart.setOption({
                grid: { top: 30, bottom: 20, left: 40, right: 12 },
                tooltip: { trigger: "axis" },
                legend: {
                    data: ["全国总量", "上海"],
                    top: 0,
                    right: 0,
                    textStyle: { color: "#8b9bb4" },
                    icon: "circle",
                    itemWidth: 8,
                },
                xAxis: {
                    type: "category",
                    data: overview.trend.map((item) => item.label),
                    axisLine: { lineStyle: { color: "#212d40" } },
                    axisLabel: { color: "#8b9bb4" },
                },
                yAxis: {
                    type: "value",
                    splitLine: { lineStyle: { color: "#212d40", type: "dashed" } },
                    axisLabel: { color: "#8b9bb4" },
                },
                series: [
                    {
                        name: "全国总量",
                        type: "line",
                        smooth: true,
                        symbol: "none",
                        data: overview.trend.map((item) => item.national_flow),
                        itemStyle: { color: "#64748b" },
                        lineStyle: { width: 2, type: "dashed" },
                    },
                    {
                        name: "上海",
                        type: "line",
                        smooth: true,
                        data: overview.trend.map((item) => item.shanghai_flow),
                        itemStyle: { color: "#00d2ff" },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: "rgba(0, 210, 255, 0.20)" },
                                { offset: 1, color: "rgba(0, 210, 255, 0)" },
                            ]),
                        },
                    },
                ],
            });
        }

        async function loadTopology() {
            shanghaiTopology = await request("/shanghai/topology");
        }

        async function loadShanghai() {
            timeText.textContent = formatHour(currentHour);
            const [flow, lines] = await Promise.all([
                request("/shanghai/flow", { hour: currentHour }),
                request("/shanghai/lines", { hour: currentHour }),
            ]);

            if (!currentStation && flow.length) {
                currentStation = flow[0].station_name;
            }
            if (flow.length && !flow.some((item) => item.station_name === currentStation)) {
                currentStation = flow[0].station_name;
            }

            const extent = shanghaiTopology.extent || {};
            const thresholds = { yellow: 8, red: 18 };
            const lineSeries = (shanghaiTopology.lines || []).map((line) => ({
                name: line.line_name,
                type: "line",
                data: line.points,
                showSymbol: false,
                smooth: false,
                silent: true,
                lineStyle: {
                    width: 4,
                    color: line.color,
                    opacity: 0.92,
                },
                z: 1,
            }));

            scatterChart.setOption({
                tooltip: {
                    trigger: "item",
                    formatter: (params) => {
                        if (params.componentSubType === "line") {
                            return params.seriesName;
                        }
                        return [
                            params.name,
                            `小时客流：${params.data.value[3]}`,
                            `拥挤指数：${params.data.value[2]}`,
                            `线路：${params.data.lineNames}`,
                        ].join("<br/>");
                    },
                },
                xAxis: { show: false, min: extent.min_x ? extent.min_x - 1200 : "dataMin", max: extent.max_x ? extent.max_x + 1200 : "dataMax", scale: true },
                yAxis: { show: false, min: extent.min_y ? extent.min_y - 1200 : "dataMin", max: extent.max_y ? extent.max_y + 1200 : "dataMax", scale: true },
                dataZoom: [
                    {
                        type: "inside",
                        xAxisIndex: 0,
                        filterMode: "none",
                        zoomOnMouseWheel: true,
                        moveOnMouseMove: true,
                    },
                    {
                        type: "inside",
                        yAxisIndex: 0,
                        filterMode: "none",
                        zoomOnMouseWheel: true,
                        moveOnMouseMove: true,
                    },
                ],
                series: [
                    ...lineSeries,
                    {
                        type: "scatter",
                        z: 3,
                        data: flow.map((item) => ({
                            name: item.station_name,
                            value: [item.plot_x, item.plot_y, item.crowd_index, item.avg_flow],
                            lineNames: item.line_names,
                        })),
                        symbolSize(value) {
                            return Math.max(8, value[2] / 6);
                        },
                        itemStyle: {
                            color(params) {
                                const v = params.value[2];
                                if (v <= 0) return "#5f6f86";
                                if (v >= thresholds.red) return "#e60026";
                                if (v >= thresholds.yellow) return "#faad14";
                                return "#00b365";
                            },
                            borderColor: "#ffffff",
                            borderWidth: 1,
                        },
                    }
                ],
            });

            lineHeatChart.setOption({
                tooltip: { trigger: "axis" },
                xAxis: {
                    type: "value",
                    axisLabel: { color: "#9db0c8" },
                    splitLine: { lineStyle: { color: "#22334b" } },
                },
                yAxis: {
                    type: "category",
                    data: lines.map((item) => item.line_name).reverse(),
                    axisLabel: { color: "#dce7f5" },
                },
                series: [{
                    type: "bar",
                    data: lines.map((item) => item.crowd_index).reverse(),
                    itemStyle: { color: "#00d2ff" },
                }],
            });

            await loadStationDetail(currentStation);
        }

        async function loadStationDetail(stationName) {
            currentStation = stationName;
            const detail = await request(`/shanghai/station/${encodeURIComponent(stationName)}`);
            stationTitle.textContent = `站点详情 - ${detail.station.station_name}`;
            stationDetailChart.setOption({
                tooltip: { trigger: "axis" },
                xAxis: {
                    type: "category",
                    data: detail.series.map((item) => item.hour_label),
                    axisLabel: { color: "#9db0c8", rotate: 45 },
                },
                yAxis: {
                    type: "value",
                    axisLabel: { color: "#9db0c8" },
                    splitLine: { lineStyle: { color: "#22334b" } },
                },
                series: [{
                    type: "line",
                    smooth: true,
                    data: detail.series.map((item) => item.avg_flow),
                    itemStyle: { color: "#faad14" },
                }],
            });
        }

        function togglePlay() {
            playing = !playing;
            playBtn.textContent = playing ? "暂停" : "播放";
            if (playing) {
                timer = window.setInterval(() => {
                    currentHour = (currentHour + 1) % 24;
                    hourRange.value = currentHour;
                    loadShanghai();
                }, 1000);
            } else if (timer) {
                window.clearInterval(timer);
                timer = null;
            }
        }

        document.querySelectorAll(".tab-btn").forEach((button) => {
            button.addEventListener("click", () => setActiveTab(button.dataset.tab));
        });

        hourRange.addEventListener("input", async (event) => {
            currentHour = Number(event.target.value);
            await loadShanghai();
        });

        playBtn.addEventListener("click", togglePlay);
        reloadBtn.addEventListener("click", loadShanghai);

        scatterChart.on("click", (params) => {
            if (params.name) {
                loadStationDetail(params.name);
            }
        });

        window.addEventListener("resize", () => {
            [cityMapChart, top10Chart, trendChart, scatterChart, lineHeatChart, stationDetailChart].forEach((chart) => chart.resize());
        });

        (async () => {
            try {
                await loadOverview();
                await loadTopology();
                await loadShanghai();
            } catch (error) {
                console.error(error);
                alert("数据加载失败，请先启动 Flask 后端，再打开 demo.html。");
            }
        })();
    </script>
</body>
</html>
