<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MetroFlow Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.2/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/map/js/china.js"></script>
    <style>
        :root {
            --bg-base: #09111b;
            --bg-panel: rgba(17, 27, 40, 0.96);
            --border-color: #21334c;
            --text-main: #e6eef8;
            --text-sub: #8ca2bc;
            --primary: #0081ff;
            --cyan: #00d2ff;
            --green: #00b365;
            --yellow: #faad14;
            --red: #e60026;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text-main);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(0, 129, 255, 0.22), transparent 28%),
                radial-gradient(circle at top right, rgba(0, 210, 255, 0.14), transparent 24%),
                var(--bg-base);
        }

        .page {
            padding: 16px;
        }

        .topbar {
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            background: var(--bg-panel);
            margin-bottom: 16px;
        }

        .brand {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 4px;
        }

        .tabs {
            display: flex;
            gap: 12px;
        }

        .tab-btn, .ghost-btn {
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-main);
            border-radius: 10px;
            padding: 10px 16px;
            cursor: pointer;
        }

        .tab-btn.active, .ghost-btn.primary {
            background: rgba(0, 129, 255, 0.18);
            border-color: var(--primary);
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }

        .metric-card, .panel, .control-bar {
            border: 1px solid var(--border-color);
            border-radius: 14px;
            background: var(--bg-panel);
        }

        .metric-card {
            padding: 18px;
        }

        .metric-label {
            color: var(--text-sub);
            font-size: 13px;
            margin-bottom: 10px;
        }

        .metric-value {
            font-size: 28px;
            font-weight: 700;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1.65fr 1fr;
            gap: 16px;
        }

        .panel {
            padding: 16px;
            min-height: 340px;
        }

        .panel.large {
            min-height: 420px;
        }

        .panel-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .chart {
            width: 100%;
            height: 360px;
        }

        .panel.large .chart {
            height: 420px;
        }

        .control-bar {
            display: grid;
            grid-template-columns: 100px 1fr auto;
            align-items: center;
            gap: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .time-text {
            font-size: 28px;
            font-weight: 700;
            color: var(--cyan);
        }

        .ctrl-group {
            display: flex;
            gap: 12px;
        }

        .tips {
            color: var(--text-sub);
            font-size: 12px;
            margin-top: 12px;
        }

        input[type="range"] {
            width: 100%;
        }

        @media (max-width: 1200px) {
            .metrics, .main-grid {
                grid-template-columns: 1fr;
            }

            .control-bar {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="topbar">
            <div>
                <div class="brand">MetroFlow</div>
                <div class="subtitle">单文件 API 联调页，适合后端开发时快速验证接口</div>
            </div>
            <div class="tabs">
                <button class="tab-btn active" data-tab="overview">全国概览</button>
                <button class="tab-btn" data-tab="shanghai">上海微观</button>
            </div>
        </header>

        <section id="overview" class="tab-panel active">
            <div class="metrics">
                <div class="metric-card">
                    <div class="metric-label">开通地铁城市</div>
                    <div id="metric-city-count" class="metric-value">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">日均客流总量</div>
                    <div id="metric-total-flow" class="metric-value">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">上海站点总数</div>
                    <div id="metric-station-count" class="metric-value">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">换乘站数量</div>
                    <div id="metric-transfer-count" class="metric-value">--</div>
                </div>
            </div>

            <div class="main-grid">
                <div class="panel large">
                    <div class="panel-title">全国地铁城市气泡图</div>
                    <div id="city-map" class="chart"></div>
                </div>
                <div class="panel">
                    <div class="panel-title">客流 Top10</div>
                    <div id="top10-chart" class="chart"></div>
                </div>
                <div class="panel">
                    <div class="panel-title">月度趋势</div>
                    <div id="trend-chart" class="chart"></div>
                </div>
            </div>
        </section>

        <section id="shanghai" class="tab-panel">
            <div class="control-bar">
                <div id="time-text" class="time-text">08:00</div>
                <input id="hour-range" type="range" min="0" max="23" value="8" />
                <div class="ctrl-group">
                    <button id="play-btn" class="ghost-btn primary">播放</button>
                    <button id="reload-btn" class="ghost-btn">刷新</button>
                </div>
            </div>

            <div class="main-grid">
                <div class="panel large">
                    <div class="panel-title">上海站点散点图</div>
                    <div id="station-scatter" class="chart"></div>
                    <div class="tips">点击散点可查看单站点 24 小时曲线</div>
                </div>
                <div class="panel">
                    <div class="panel-title">线路热力条</div>
                    <div id="line-heat" class="chart"></div>
                </div>
                <div class="panel">
                    <div id="station-title" class="panel-title">站点详情</div>
                    <div id="station-detail" class="chart"></div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:5000/api";
        const hourRange = document.getElementById("hour-range");
        const timeText = document.getElementById("time-text");
        const playBtn = document.getElementById("play-btn");
        const reloadBtn = document.getElementById("reload-btn");
        const stationTitle = document.getElementById("station-title");

        const cityMapChart = echarts.init(document.getElementById("city-map"));
        const top10Chart = echarts.init(document.getElementById("top10-chart"));
        const trendChart = echarts.init(document.getElementById("trend-chart"));
        const scatterChart = echarts.init(document.getElementById("station-scatter"));
        const lineHeatChart = echarts.init(document.getElementById("line-heat"));
        const stationDetailChart = echarts.init(document.getElementById("station-detail"));

        let currentHour = 8;
        let currentStation = "人民广场";
        let playing = false;
        let timer = null;

        function formatHour(hour) {
            return `${String(hour).padStart(2, "0")}:00`;
        }

        function setActiveTab(tabName) {
            document.querySelectorAll(".tab-btn").forEach((button) => {
                button.classList.toggle("active", button.dataset.tab === tabName);
            });
            document.querySelectorAll(".tab-panel").forEach((panel) => {
                panel.classList.toggle("active", panel.id === tabName);
            });
            window.dispatchEvent(new Event("resize"));
        }

        async function request(path, params) {
            const response = await axios.get(`${API_BASE}${path}`, { params });
            return response.data.data;
        }

        async function loadOverview() {
            const [overview, cities] = await Promise.all([
                request("/overview"),
                request("/overview/cities"),
            ]);

            document.getElementById("metric-city-count").textContent = overview.metrics.city_count;
            document.getElementById("metric-total-flow").textContent = `${overview.metrics.total_daily_flow} 万`;
            document.getElementById("metric-station-count").textContent = overview.metrics.station_count;
            document.getElementById("metric-transfer-count").textContent = overview.metrics.transfer_station_count;

            cityMapChart.setOption({
                backgroundColor: "transparent",
                tooltip: { trigger: "item" },
                geo: {
                    map: "china",
                    roam: true,
                    itemStyle: {
                        areaColor: "#152033",
                        borderColor: "#314764",
                    },
                    emphasis: {
                        itemStyle: {
                            areaColor: "#1d2c45",
                        },
                    },
                },
                series: [{
                    type: "scatter",
                    coordinateSystem: "geo",
                    data: cities.map((item) => ({
                        name: item.city_name,
                        value: [item.longitude, item.latitude, item.avg_daily_flow],
                    })),
                    symbolSize(value) {
                        return Math.max(12, value[2] / 40);
                    },
                    itemStyle: {
                        color: "#00d2ff",
                        shadowBlur: 16,
                        shadowColor: "rgba(0, 210, 255, 0.4)",
                    },
                }],
            });

            top10Chart.setOption({
                tooltip: { trigger: "axis" },
                xAxis: {
                    type: "value",
                    axisLabel: { color: "#9db0c8" },
                    splitLine: { lineStyle: { color: "#22334b" } },
                },
                yAxis: {
                    type: "category",
                    data: overview.top10.map((item) => item.city_name).reverse(),
                    axisLabel: { color: "#dce7f5" },
                },
                series: [{
                    type: "bar",
                    data: overview.top10.map((item) => item.value).reverse(),
                    itemStyle: { color: "#0081ff" },
                }],
            });

            trendChart.setOption({
                tooltip: { trigger: "axis" },
                legend: { textStyle: { color: "#dce7f5" } },
                xAxis: {
                    type: "category",
                    data: overview.trend.map((item) => item.label),
                    axisLabel: { color: "#9db0c8" },
                },
                yAxis: {
                    type: "value",
                    axisLabel: { color: "#9db0c8" },
                    splitLine: { lineStyle: { color: "#22334b" } },
                },
                series: [
                    {
                        name: "全国",
                        type: "line",
                        smooth: true,
                        data: overview.trend.map((item) => item.national_flow),
                        itemStyle: { color: "#00d2ff" },
                    },
                    {
                        name: "上海",
                        type: "line",
                        smooth: true,
                        data: overview.trend.map((item) => item.shanghai_flow),
                        itemStyle: { color: "#faad14" },
                    },
                ],
            });
        }

        async function loadShanghai() {
            timeText.textContent = formatHour(currentHour);
            const [flow, lines] = await Promise.all([
                request("/shanghai/flow", { hour: currentHour }),
                request("/shanghai/lines", { hour: currentHour }),
            ]);

            if (!currentStation && flow.length) {
                currentStation = flow[0].station_name;
            }
            if (flow.length && !flow.some((item) => item.station_name === currentStation)) {
                currentStation = flow[0].station_name;
            }

            scatterChart.setOption({
                tooltip: { trigger: "item" },
                xAxis: { show: false, min: "dataMin", max: "dataMax" },
                yAxis: { show: false, min: "dataMin", max: "dataMax" },
                series: [{
                    type: "scatter",
                    data: flow.map((item) => ({
                        name: item.station_name,
                        value: [item.plot_x, item.plot_y, item.crowd_index, item.avg_flow],
                    })),
                    symbolSize(value) {
                        return Math.max(8, value[2] / 6);
                    },
                    itemStyle: {
                        color(params) {
                            const v = params.value[2];
                            if (v >= 75) return "#e60026";
                            if (v >= 45) return "#faad14";
                            return "#00b365";
                        },
                    },
                }],
            });

            lineHeatChart.setOption({
                tooltip: { trigger: "axis" },
                xAxis: {
                    type: "value",
                    axisLabel: { color: "#9db0c8" },
                    splitLine: { lineStyle: { color: "#22334b" } },
                },
                yAxis: {
                    type: "category",
                    data: lines.map((item) => item.line_name).reverse(),
                    axisLabel: { color: "#dce7f5" },
                },
                series: [{
                    type: "bar",
                    data: lines.map((item) => item.crowd_index).reverse(),
                    itemStyle: { color: "#00d2ff" },
                }],
            });

            await loadStationDetail(currentStation);
        }

        async function loadStationDetail(stationName) {
            currentStation = stationName;
            const detail = await request(`/shanghai/station/${encodeURIComponent(stationName)}`);
            stationTitle.textContent = `站点详情 - ${detail.station.station_name}`;
            stationDetailChart.setOption({
                tooltip: { trigger: "axis" },
                xAxis: {
                    type: "category",
                    data: detail.series.map((item) => item.hour_label),
                    axisLabel: { color: "#9db0c8", rotate: 45 },
                },
                yAxis: {
                    type: "value",
                    axisLabel: { color: "#9db0c8" },
                    splitLine: { lineStyle: { color: "#22334b" } },
                },
                series: [{
                    type: "line",
                    smooth: true,
                    data: detail.series.map((item) => item.avg_flow),
                    itemStyle: { color: "#faad14" },
                }],
            });
        }

        function togglePlay() {
            playing = !playing;
            playBtn.textContent = playing ? "暂停" : "播放";
            if (playing) {
                timer = window.setInterval(() => {
                    currentHour = (currentHour + 1) % 24;
                    hourRange.value = currentHour;
                    loadShanghai();
                }, 1000);
            } else if (timer) {
                window.clearInterval(timer);
                timer = null;
            }
        }

        document.querySelectorAll(".tab-btn").forEach((button) => {
            button.addEventListener("click", () => setActiveTab(button.dataset.tab));
        });

        hourRange.addEventListener("input", async (event) => {
            currentHour = Number(event.target.value);
            await loadShanghai();
        });

        playBtn.addEventListener("click", togglePlay);
        reloadBtn.addEventListener("click", loadShanghai);

        scatterChart.on("click", (params) => {
            if (params.name) {
                loadStationDetail(params.name);
            }
        });

        window.addEventListener("resize", () => {
            [cityMapChart, top10Chart, trendChart, scatterChart, lineHeatChart, stationDetailChart].forEach((chart) => chart.resize());
        });

        Promise.all([loadOverview(), loadShanghai()]).catch((error) => {
            console.error(error);
            alert("数据加载失败，请先启动 Flask 后端，再打开 demo.html。");
        });
    </script>
</body>
</html>
